[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #1da5d4
secondary = #8ABEB7
alert = #e31b1b
disabled = #707880
positive = #BAE35B
black = #000000
white = #FFFFFF
; Basic colors, mostly for testing
basicblue = #0000FF
basicred = #FF0000
basicgreen = #00FF00
basicyellow = #FFFF00
basicorange = #FF6600
basicpurple = #6600FF

[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = в”Ӯ
separator-font = 3
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Regular:size=12;2"
font-1 = "JetBrainsMono Nerd Font Mono:size=22;5"

; Fonts used for specific items
font-2 = "JetBrainsMono Nerd Font Mono:size=16;4"
font-3 = "JetBrainsMono Nerd Font Mono:size=24;5"
font-4 = "JetBrainsMono Nerd Font Mono:size=16;3"
;	Battery lightning bolt
font-5 = "JetBrainsMono Nerd Font Mono:size=14;5"

modules-left = xworkspaces i3 xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu battery wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/i3]
format = label-visible label-mode-foreground
label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini